<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prod Shield</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <img src="./icons/icon16.png" />
          <span>Prod Shield</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="status-badge" class="badge badge-active">Active</div>
          <button id="settings-toggle" class="settings-icon-btn" title="Settings">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="status-bar" class="status-bar">
        <span id="domain-info">Monitoring: —</span>
      </div>

      <div id="main-view">
        <div class="panel-title">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
            />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          Changed Fields
          <span id="change-count" class="count-pill">0</span>
          <button
            id="export-btn"
            class="export-btn"
            title="Export as PDF"
            style="display: none"
          >
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Change logs
          </button>
        </div>
        <div id="changes-list" class="changes-list">
          <div class="empty-state">No fields changed yet.</div>
        </div>
      </div>

      <div class="actions">
        <button id="stop-btn" class="btn btn-danger">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          </svg>
          Stop Extension
        </button>
        <button id="restart-btn" class="btn btn-success" style="display: none">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Restart Extension
        </button>
        <p class="restart-note" id="restart-note">
          Restarts automatically on page refresh or new tab.
        </p>
      </div>
      </div>
      <div id="settings-panel" style="display:none;">
        <div class="panel" style="margin-top:12px;">
          <div class="panel-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Settings
          </div>

          <div class="settings-field">
            <label class="settings-label" for="cfg-domain">Target Domain</label>
            <input id="cfg-domain" class="settings-input" type="text" placeholder="e.g. www.test.com" />
          </div>

          <div class="settings-field settings-toggle-row">
            <span class="settings-label" style="margin-bottom:0;">Page Identifier</span>
            <label class="toggle-switch">
              <input id="cfg-identifier-enabled" type="checkbox" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="settings-field" id="identifier-field-wrap" style="display:none;">
            <label class="settings-label" for="cfg-identifier">
              Identifier Selector
              <span class="settings-hint">class, id, or [data-attr]</span>
            </label>
            <input id="cfg-identifier" class="settings-input" type="text" placeholder=".admin-panel, #app-root, [data-env='prod']" />
          </div>

          <div class="settings-field settings-toggle-row">
            <span class="settings-label" style="margin-bottom:0;">Change Log</span>
            <label class="toggle-switch">
              <input id="cfg-change-log" type="checkbox" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="settings-field settings-toggle-row">
            <span class="settings-label" style="margin-bottom:0;">Disable buttons</span>
            <label class="toggle-switch">
              <input id="cfg-disable-buttons" type="checkbox" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="settings-field" id="selectors-field-wrap">
            <label class="settings-label" for="cfg-selectors">
              Disable Button Selectors
              <span class="settings-hint">one per line</span>
            </label>
            <textarea id="cfg-selectors" class="settings-input settings-textarea" rows="3" placeholder=".test-btn"></textarea>
          </div>

          <div class="settings-row">
            <div class="settings-field" style="flex:1;">
              <label class="settings-label" for="cfg-restart">Auto-restart(min)</label>
              <input id="cfg-restart" class="settings-input" type="number" min="1" max="1440" placeholder="15" />
            </div>
            <div class="settings-field" style="flex:1;">
              <label class="settings-label" for="cfg-banner">Close snooze(min)</label>
              <input id="cfg-banner" class="settings-input" type="number" min="1" max="60" placeholder="1" />
            </div>
          </div>

          <div style="display:flex;gap:8px;margin-top:10px;">
            <button id="settings-save" class="btn btn-success" style="flex:1;">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Save
            </button>
            <button id="settings-cancel" class="btn" style="flex:1;background:#334155;color:#94a3b8;">
              Cancel
            </button>
          </div>
          <p id="settings-saved-msg" class="restart-note" style="display:none;color:#34d399;text-align:center;margin-top:6px;">
            ✓ Settings saved. Reload the target page to apply.
          </p>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
